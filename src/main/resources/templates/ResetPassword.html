<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | BillMaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --background: #f8f9fc;
            --text-main: #334155;
            --text-light: #94a3b8;
            --white: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .reset-card {
            background: var(--white);
            padding: 3rem;
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 24px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.2);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        p {
            color: var(--text-light);
            font-size: 0.9375rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background-color: #fcfcfd;
            font-size: 0.9375rem;
            transition: all 0.3s ease;
            outline: none;
            padding-right: 45px;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
            background-color: var(--white);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.3s;
            z-index: 10;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .reset-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.2);
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.3);
        }

        .back-to-login {
            display: block;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .success-box {
            display: none;
        }
    </style>
</head>

<body>
    <div class="reset-card" id="formBox">
        <div class="logo">B</div>
        <h1>Create New Password</h1>
        <p>Your new password must be different from previous passwords.</p>

        <form id="resetForm">
            <input type="hidden" id="token" th:value="${token}">
            
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="password-container">
                    <input type="password" id="newPassword" placeholder="••••••••" required minlength="6">
                    <i class="fa-solid fa-eye toggle-password" id="toggleNew" onclick="togglePass('newPassword', 'toggleNew')"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <div class="password-container">
                    <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
                    <i class="fa-solid fa-eye toggle-password" id="toggleConfirm" onclick="togglePass('confirmPassword', 'toggleConfirm')"></i>
                </div>
            </div>

            <button type="submit" class="reset-btn">Reset Password</button>
        </form>

        <a href="/billing-app/api/Login" class="back-to-login">Back to Login</a>
    </div>

    <div class="reset-card success-box" id="successBox">
        <div class="logo" style="background: #22c55e;"><i class="fa-solid fa-check"></i></div>
        <h1>Password Restored!</h1>
        <p>Your password has been successfully updated. You can now login with your new credentials.</p>
        <a href="/billing-app/api/Login" class="reset-btn" style="text-decoration: none; display: block;">Login Now</a>
    </div>

    <script>
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('resetForm').onsubmit = async function(e) {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const token = document.getElementById('token').value;

            if (newPass !== confirmPass) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const response = await fetch('/billing-app/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, newPassword: newPass })
                });

                const data = await response.text();
                if (response.ok) {
                    document.getElementById('formBox').style.display = 'none';
                    document.getElementById('successBox').style.display = 'block';
                } else {
                    alert("Error: " + data);
                }
            } catch (err) {
                alert("Something went wrong. Please try again.");
            }
        }
    </script>
</body>

</html>
