<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Way Reports | SFP Billing</title>
    <div th:replace="~{fragments/sidebar :: sidebar-css}"></div>
    <style>
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header-section h1 {
            font-size: 28px;
            font-weight: 800;
        }

        .card-panel {
            background: var(--white);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 16px;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 18px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            font-size: 14px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .filter-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            background: white;
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            align-items: center;
        }

        .filter-input {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .filter-input:focus {
            border-color: var(--primary);
        }

        .premium-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            text-align: center;
            color: var(--text-muted);
            width: 100%;
        }

        .premium-empty-state i {
            font-size: 2.5rem;
            color: #94a3b8;
            margin-bottom: 24px;
            background: #f8fafc;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
        }

        .btn-action {
            position: relative;
            padding: 8px 12px;
            border-radius: 10px;
            background: #f1f5f9;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .share-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            margin-bottom: 8px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            width: 160px;
            display: none;
            z-index: 100;
            overflow: hidden;
        }

        .share-menu.show {
            display: block;
        }

        .share-menu-item {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
            width: 100%;
            text-align: left;
            background: none;
        }

        .share-menu-item:hover {
            background: #f8fafc;
            color: var(--primary);
        }

        .share-menu-item i {
            width: 14px;
            text-align: center;
        }

        .share-menu-item.whatsapp i {
            color: #25d366;
        }

        .share-menu-item.email i {
            color: #ea4335;
        }

        .btn-action:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        #shareToast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            z-index: 9999;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
        }

        #shareToast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .reports-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .reports-stat-card {
            background: var(--white);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
        }

        .reports-stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.05);
        }

        .reports-stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .reports-stat-info label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .reports-stat-info .value {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='eway-bill-logs')}"></div>

    <div class="main-content">
        <div class="header-section">
            <div>
                <h1>E-Way Reports</h1>
                <p style="color: var(--text-muted); margin-top: 4px;">Tracking movement of goods & compliance</p>
            </div>
        </div>

        <div class="reports-stats-grid">
            <div class="reports-stat-card">
                <div class="reports-stat-icon" style="background: #f1f5f9; color: #475569;">
                    <i class="fa-solid fa-truck-fast"></i>
                </div>
                <div class="reports-stat-info">
                    <label>Total E-Way Bills</label>
                    <div class="value" id="cardTotalBills">0</div>
                </div>
            </div>
            <div class="reports-stat-card">
                <div class="reports-stat-icon" style="background: #f0fdf4; color: #16a34a;">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </div>
                <div class="reports-stat-info">
                    <label>Outward Supply</label>
                    <div class="value" id="cardOutward">0</div>
                </div>
            </div>
            <div class="reports-stat-card">
                <div class="reports-stat-icon" style="background: #fff1f2; color: #e11d48;">
                    <i class="fa-solid fa-file-import"></i>
                </div>
                <div class="reports-stat-info">
                    <label>Inward Supply</label>
                    <div class="value" id="cardInward">0</div>
                </div>
            </div>
        </div>

        <div class="filter-bar">
            <div style="flex: 1;">
                <input type="text" id="logSearch" class="filter-input"
                    placeholder="Search by E-Way Bill Number, Name or GSTIN..." onkeyup="filterLogs()">
            </div>
        </div>

        <div class="card-panel">
            <table>
                <thead>
                    <tr>
                        <th>E-Way Bill #</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Vehicle #</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logsTable">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">
                            <i class="fa-solid fa-circle-notch fa-spin"></i> Loading logs...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script th:inline="javascript">
        let allLogs = [];

        async function loadLogs() {
            try {
                const response = await fetch('/billing-app/api/EWayBill/logs');
                allLogs = await response.json();

                // Update Stats
                const total = allLogs.length;
                const outward = allLogs.filter(l => (l.supplyType || '').toUpperCase() === 'OUTWARD').length;
                const inward = allLogs.filter(l => (l.supplyType || '').toUpperCase() === 'INWARD').length;

                document.getElementById('cardTotalBills').innerText = total;
                document.getElementById('cardOutward').innerText = outward;
                document.getElementById('cardInward').innerText = inward;

                renderLogs(allLogs);
            } catch (error) {
                console.error('Error fetching logs:', error);
                document.getElementById('logsTable').innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--danger);">Failed to load logs.</td></tr>`;
            }
        }

        function filterLogs() {
            const searchText = document.getElementById('logSearch').value.toLowerCase();
            const filtered = allLogs.filter(log => {
                const ewbNum = (log.ewayBillNumber || '').toLowerCase();
                const fromName = (log.fromName || '').toLowerCase();
                const toName = (log.toName || '').toLowerCase();
                const fromGst = (log.fromGSTIN || '').toLowerCase();
                const toGst = (log.toGSTIN || '').toLowerCase();
                const vehicleNum = (log.vehicleNumber || '').toLowerCase();

                return ewbNum.includes(searchText) ||
                    fromName.includes(searchText) ||
                    toName.includes(searchText) ||
                    fromGst.includes(searchText) ||
                    toGst.includes(searchText) ||
                    vehicleNum.includes(searchText);
            });
            renderLogs(filtered);
        }

        function renderLogs(logs) {
            const tableBody = document.getElementById('logsTable');
            if (logs.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="premium-empty-state">
                                <i class="fa-solid fa-truck-fast"></i>
                                <h3>No E-Way Bills Found</h3>
                                <p>No logs available. Start generating E-Way Bills to see them here.</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = logs.map(log => `
                <tr>
                    <td><a href="/billing-app/api/EWayBill/Detail/${log.id}" style="text-decoration: none;"><span style="font-weight: 700; color: var(--primary);">#${log.ewayBillNumber}</span></a></td>
                    <td>
                        <div style="font-weight: 600;">${log.fromName || 'N/A'}</div>
                        <div style="font-size: 11px; color: #94a3b8;">GST: ${log.fromGSTIN || '-'}</div>
                    </td>
                    <td>
                        <div style="font-weight: 600;">${log.toName || 'N/A'}</div>
                        <div style="font-size: 11px; color: #94a3b8;">GST: ${log.toGSTIN || '-'}</div>
                    </td>
                    <td><span style="background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-weight: 700; color: #475569;">${log.vehicleNumber || 'N/A'}</span></td>
                    <td style="color: var(--text-muted);">${formatDate(log.createdAt)}</td>
                    <td style="display: flex; gap: 8px;">
                        <a href="/billing-app/api/EWayBill/Detail/${log.id}" class="btn-action" title="View Detail">
                            <i class="fa-solid fa-eye"></i>
                        </a>
                        <div style="position: relative;">
                            <button class="btn-action" onclick="toggleRowMenu(${log.id})" title="Share">
                                <i class="fa-solid fa-share-nodes"></i>
                            </button>
                            <div class="share-menu" id="menu-${log.id}">
                                <button class="share-menu-item whatsapp" onclick="rowShareWhatsApp(event, ${log.id})">
                                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                                </button>
                                <button class="share-menu-item email" onclick="rowShareEmail(event, ${log.id})">
                                    <i class="fa-solid fa-envelope"></i> Email
                                </button>
                                <button class="share-menu-item copy" onclick="copyLink(${log.id})">
                                    <i class="fa-solid fa-link"></i> Copy Link
                                </button>
                            </div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function toggleRowMenu(id) {
            // Close all other menus first
            document.querySelectorAll('.share-menu').forEach(m => {
                if (m.id !== `menu-${id}`) m.classList.remove('show');
            });
            document.getElementById(`menu-${id}`).classList.toggle('show');
        }

        // Close menus when clicking outside
        window.onclick = function (event) {
            if (!event.target.closest('.btn-action')) {
                document.querySelectorAll('.share-menu').forEach(m => m.classList.remove('show'));
            }
        }

        function rowShareWhatsApp(event, id) {
            const btn = event.currentTarget || event.target;
            Utils.setLoading(btn);
            setTimeout(() => {
                showToast('🚀 WhatsApp feature coming soon!');
                Utils.stopLoading(btn);
            }, 800);
        }

        function rowShareEmail(event, id) {
            const btn = event.currentTarget || event.target;
            Utils.setLoading(btn);
            setTimeout(() => {
                showToast('📧 Email feature coming soon!');
                Utils.stopLoading(btn);
            }, 800);
        }

        function copyLink(id) {
            const link = `${window.location.origin}/billing-app/api/EWayBill/Detail/${id}`;
            navigator.clipboard.writeText(link).then(() => {
                showToast('✅ Link copied to clipboard!');
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('shareToast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function formatDate(dateData) {
            if (!dateData) return 'N/A';
            const date = new Date(dateData);
            return `${String(date.getDate()).padStart(2, '0')}-${String(date.getMonth() + 1).padStart(2, '0')}-${date.getFullYear()}`;
        }

        window.onload = loadLogs;
    </script>
    <div id="shareToast">Link copied to clipboard!</div>
</body>

</html>
