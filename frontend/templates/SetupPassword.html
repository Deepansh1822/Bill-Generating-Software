<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Password | SFP Billing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: var(--dark);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .password-container {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .password-container input {
            padding-right: 45px;
            margin-bottom: 0;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.3s;
            z-index: 10;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        /* Loading Effect */
        .btn-loading {
            position: relative !important;
            color: transparent !important;
            pointer-events: none !important;
            opacity: 0.8 !important;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            top: calc(50% - 9px);
            left: calc(50% - 9px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: btn-spin 0.6s linear infinite;
        }

        @keyframes btn-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Set Your Password</h2>
        <p>Please enter a strong password to secure your account.</p>
        <form id="setupForm">
            <div class="password-container">
                <input type="password" id="password" placeholder="Set Password" required>
                <i class="fa-solid fa-eye toggle-password" id="togglePass"
                    onclick="togglePassword('password', 'togglePass')"></i>
            </div>
            <div class="password-container">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <i class="fa-solid fa-eye toggle-password" id="toggleConfirm"
                    onclick="togglePassword('confirmPassword', 'toggleConfirm')"></i>
            </div>
            <button type="submit" class="btn" id="finishBtn">Finish Setup</button>
        </form>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const toggleIcon = document.getElementById(iconId);
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('finishBtn');
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            btn.classList.add('btn-loading');
            btn.disabled = true;

            try {
                const response = await fetch('/billing-app/api/setup-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const result = await response.text();
                alert(result);
                if (response.ok && result.includes('successfully')) {
                    window.location.href = '/billing-app/api/Login';
                }
            } catch (err) {
                alert('Something went wrong. Please try again.');
            } finally {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
